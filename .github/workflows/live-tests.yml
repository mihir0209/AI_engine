name: Live Tests

on:
  schedule:
    - cron: "0 8 1 * *"
  workflow_dispatch:
    inputs:
      python-version:
        description: Python version
        required: false
        default: "3.12"
        type: choice
        options:
          - "3.10"
          - "3.11"
          - "3.12"

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version || '3.12' }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"

      - name: Run live-marked tests
        env:
          AI_ENGINE_MODE: live
          AI_ENGINE_RUN_LIVE_TESTS: "1"
        run: |
          pytest tests/ -m live --timeout=60 -v --tb=short