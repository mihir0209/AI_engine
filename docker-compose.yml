version: '3.8'

services:
  ai-engine:
    build: .
    container_name: ai-engine
    ports:
      - "8000:8000"
    volumes:
      - ./.env:/app/.env:ro
      - ./key_statistics.json:/app/key_statistics.json
      - ./model_cache.json:/app/model_cache.json
      - ./chat_data.db:/app/chat_data.db
    environment:
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  ai-engine-data:
