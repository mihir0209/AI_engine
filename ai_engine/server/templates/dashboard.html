<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Synapse — Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <style>
        :root {
            --primary: #0d6efd;
            --gradient-start: #667eea;
            --gradient-end: #764ba2;
        }
        body { background: #f4f6f9; }
        .hero-card {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: white;
            border: none;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        .hero-card h1 { font-size: 1.8rem; font-weight: 700; margin: 0; }
        .hero-card p { opacity: 0.9; margin: 0.5rem 0 0 0; font-size: 1rem; }
        .stat-card {
            border: none;
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .stat-card .card-body { padding: 1.25rem; }
        .stat-card .stat-icon { font-size: 2rem; opacity: 0.7; }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-card .stat-label { font-size: 0.85rem; opacity: 0.8; }
        .feature-card {
            border: 1px solid #e9ecef;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .feature-card:hover { border-color: var(--primary); box-shadow: 0 4px 15px rgba(13,110,253,0.1); }
        .feature-card .card-body { padding: 1.5rem; }
        .feature-card h5 { font-weight: 600; font-size: 1rem; }
        .feature-card p { font-size: 0.9rem; color: #6c757d; }
        .version-badge {
            background: rgba(255,255,255,0.2);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .provider-list { max-height: 300px; overflow-y: auto; }
        .provider-item {
            display: flex;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .provider-item:last-child { border-bottom: none; }
        .provider-dot {
            width: 8px; height: 8px; border-radius: 50%;
            margin-right: 0.5rem;
        }
        .provider-dot.active { background: #198754; }
        .provider-dot.inactive { background: #dc3545; }
        .metric-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }
        .metric-card h6 { font-size: 0.85rem; text-transform: uppercase; color: #6c757d; margin-bottom: 0.5rem; }
        .metric-row { display: flex; justify-content: space-between; padding: 0.25rem 0; }
        .metric-row:not(:last-child) { border-bottom: 1px solid #f0f0f0; }
        .metric-label { font-size: 0.85rem; color: #6c757d; }
        .metric-value { font-size: 0.85rem; font-weight: 600; }
        .success-rate { color: #198754; }
        .fail-rate { color: #dc3545; }
        .endpoint-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }
        .endpoint-card .endpoint-name { font-weight: 600; }
        .endpoint-card .endpoint-stats { color: #6c757d; font-size: 0.75rem; }
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="fas fa-bolt"></i> AI Synapse <span class="version-badge" id="navVersion"></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link active" href="/"><i class="fas fa-th-large"></i> Dashboard</a>
                    <a class="nav-link" href="/providers"><i class="fas fa-server"></i> Providers</a>
                    <a class="nav-link" href="/models"><i class="fas fa-cubes"></i> Models</a>
                    <a class="nav-link" href="/chat"><i class="fas fa-comments"></i> Chat</a>
                    <a class="nav-link" href="/docs"><i class="fas fa-book"></i> API</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Hero -->
        <div class="hero-card">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1><i class="fas fa-bolt"></i> AI Synapse</h1>
                    <p>Free multi-provider AI inference — 27+ providers, zero server cost.</p>
                </div>
                <div class="text-end">
                    <div class="version-badge" id="heroVersion">v4.0.11</div>
                    <div class="mt-2" id="heroUptime" style="font-size:0.85rem;opacity:0.8"></div>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-value text-success" id="activeProviders">-</div>
                            <div class="stat-label">Active Providers</div>
                        </div>
                        <i class="fas fa-check-circle stat-icon text-success"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-value text-primary" id="totalProviders">-</div>
                            <div class="stat-label">Total Providers</div>
                        </div>
                        <i class="fas fa-server stat-icon text-primary"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-value text-warning" id="flaggedProviders">-</div>
                            <div class="stat-label">Flagged</div>
                        </div>
                        <i class="fas fa-exclamation-triangle stat-icon text-warning"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <div class="stat-value text-info" id="totalModels">-</div>
                            <div class="stat-label">Available Models</div>
                        </div>
                        <i class="fas fa-cubes stat-icon text-info"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="row g-4">
            <!-- Provider Status -->
            <div class="col-md-4">
                <div class="card feature-card h-100">
                    <div class="card-body">
                        <h5><i class="fas fa-server text-primary"></i> Provider Health</h5>
                        <div class="provider-list" id="providerList">
                            <div class="text-center text-muted py-3"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="col-md-4">
                <div class="card feature-card h-100">
                    <div class="card-body">
                        <h5><i class="fas fa-bolt text-warning"></i> Quick Actions</h5>
                        <div class="d-grid gap-2">
                            <a href="/chat" class="btn btn-primary">
                                <i class="fas fa-comments"></i> Open Chat
                            </a>
                            <a href="/providers" class="btn btn-outline-primary">
                                <i class="fas fa-server"></i> Manage Providers
                            </a>
                            <a href="/models" class="btn btn-outline-primary">
                                <i class="fas fa-cubes"></i> Browse Models
                            </a>
                            <a href="/docs" class="btn btn-outline-primary">
                                <i class="fas fa-book"></i> API Documentation
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- System Info -->
            <div class="col-md-4">
                <div class="card feature-card h-100">
                    <div class="card-body">
                        <h5><i class="fas fa-info-circle text-info"></i> System Info</h5>
                        <div id="systemInfo">
                            <div class="d-flex justify-content-between py-2 border-bottom">
                                <span class="text-muted">SDK Version</span>
                                <span id="sysVersion" class="fw-bold">-</span>
                            </div>
                            <div class="d-flex justify-content-between py-2 border-bottom">
                                <span class="text-muted">Python</span>
                                <span id="sysPython" class="fw-bold">-</span>
                            </div>
                            <div class="d-flex justify-content-between py-2 border-bottom">
                                <span class="text-muted">Uptime</span>
                                <span id="sysUptime" class="fw-bold">-</span>
                            </div>
                            <div class="d-flex justify-content-between py-2">
                                <span class="text-muted">CDN Sync</span>
                                <span id="cdnStatus" class="fw-bold">-</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Provider Statistics (Key-Level) -->
            <div class="col-md-6">
                <div class="card feature-card h-100">
                    <div class="card-body">
                        <h5><i class="fas fa-chart-bar text-success"></i> Provider Key Statistics</h5>
                        <div id="keyStatistics">
                            <div class="text-center text-muted py-3"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Request Metrics -->
            <div class="col-md-6">
                <div class="card feature-card h-100">
                    <div class="card-body">
                        <h5><i class="fas fa-tachometer-alt text-primary"></i> Request Metrics</h5>
                        <div id="requestMetrics">
                            <div class="text-center text-muted py-3"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Endpoint Metrics -->
            <div class="col-md-12">
                <div class="card feature-card">
                    <div class="card-body">
                        <h5><i class="fas fa-route text-info"></i> Endpoint Performance</h5>
                        <div id="endpointMetrics">
                            <div class="text-center text-muted py-3"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SLA Status -->
            <div class="col-md-12">
                <div class="card feature-card">
                    <div class="card-body">
                        <h5><i class="fas fa-shield-alt text-warning"></i> SLA / Health Monitoring</h5>
                        <div id="slaStatus">
                            <div class="text-center text-muted py-3"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let startTime = Date.now();

        function formatDuration(ms) {
            if (ms < 1000) return `${ms.toFixed(0)}ms`;
            return `${(ms / 1000).toFixed(2)}s`;
        }

        function formatRate(rate) {
            const cls = rate >= 90 ? 'success-rate' : rate >= 70 ? 'text-warning' : 'fail-rate';
            return `<span class="${cls}">${rate.toFixed(1)}%</span>`;
        }

        async function updateDashboard() {
            try {
                const [statusRes, cdnRes, statsRes, metricsRes, endpointsRes, slaRes] = await Promise.all([
                    fetch('/api/status'),
                    fetch('/api/cdn-config').catch(() => ({json: () => ({})})),
                    fetch('/api/statistics').catch(() => ({json: () => ({})})),
                    fetch('/api/metrics/summary').catch(() => ({json: () => ({})})),
                    fetch('/api/metrics/endpoints').catch(() => ({json: () => ({})})),
                    fetch('/api/sla/status').catch(() => ({json: () => ({})}))
                ]);

                const [status, cdn, stats, metrics, endpoints, sla] = await Promise.all([
                    statusRes.json(),
                    cdnRes.json ? cdnRes.json() : Promise.resolve({}),
                    statsRes.json ? statsRes.json() : Promise.resolve({}),
                    metricsRes.json ? metricsRes.json() : Promise.resolve({}),
                    endpointsRes.json ? endpointsRes.json() : Promise.resolve({}),
                    slaRes.json ? slaRes.json() : Promise.resolve({})
                ]);

                // Top stats
                document.getElementById('activeProviders').textContent = status.available_providers || 0;
                document.getElementById('totalProviders').textContent = status.total_providers || 0;
                document.getElementById('flaggedProviders').textContent = status.flagged_providers || 0;

                const uptime = Math.floor((Date.now() - startTime) / 1000 / 60);
                document.getElementById('heroUptime').textContent = `Uptime: ${uptime}m`;
                document.getElementById('sysUptime').textContent = `${uptime}m`;
                document.getElementById('sysVersion').textContent = 'v4.0.11';
                document.getElementById('sysPython').textContent = '3.12';

                if (cdn && cdn.enabled !== undefined) {
                    document.getElementById('cdnStatus').textContent = cdn.enabled ? `Active (${cdn.ttl}s TTL)` : 'Disabled';
                } else {
                    document.getElementById('cdnStatus').textContent = 'Disabled';
                }

                // Models count
                try {
                    const modelsRes = await fetch('/v1/models');
                    const models = await modelsRes.json();
                    document.getElementById('totalModels').textContent = models.data ? models.data.length : 0;
                } catch(e) {
                    document.getElementById('totalModels').textContent = '-';
                }

                // Provider list
                const enabled = status.enabled_provider_list || [];
                const disabled = status.disabled_provider_list || [];
                const providerHtml = enabled.map(name =>
                    `<div class="provider-item"><div class="provider-dot active"></div><span class="text-truncate">${name}</span></div>`
                ).join('') + disabled.map(name =>
                    `<div class="provider-item"><div class="provider-dot inactive"></div><span class="text-truncate text-muted">${name}</span></div>`
                ).join('');
                document.getElementById('providerList').innerHTML = providerHtml || '<div class="text-muted text-center py-3">No providers</div>';

                // Key Statistics
                const keyStatsHtml = renderKeyStatistics(stats);
                document.getElementById('keyStatistics').innerHTML = keyStatsHtml;

                // Request Metrics
                const metricsHtml = renderRequestMetrics(metrics);
                document.getElementById('requestMetrics').innerHTML = metricsHtml;

                // Endpoint Metrics
                const endpointsHtml = renderEndpointMetrics(endpoints);
                document.getElementById('endpointMetrics').innerHTML = endpointsHtml;

                // SLA Status
                const slaHtml = renderSLAStatus(sla);
                document.getElementById('slaStatus').innerHTML = slaHtml;

            } catch(e) {
                console.error('Dashboard error:', e);
            }
        }

        function renderKeyStatistics(stats) {
            if (!stats || !stats.providers) return '<div class="text-muted text-center py-2">No statistics available</div>';
            
            let html = '';
            for (const [provider, data] of Object.entries(stats.providers)) {
                if (!data.keys) continue;
                html += `<div class="metric-card"><h6>${provider}</h6>`;
                for (const [keyId, keyData] of Object.entries(data.keys)) {
                    const rate = keyData.requests > 0 ? (keyData.successes / keyData.requests * 100) : 0;
                    html += `
                        <div class="metric-row">
                            <span class="metric-label">${keyId}</span>
                            <span class="metric-value">${formatRate(rate)}</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Requests</span>
                            <span class="metric-value">${keyData.requests}</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Success / Fail</span>
                            <span class="metric-value"><span class="success-rate">${keyData.successes}</span> / <span class="fail-rate">${keyData.failures}</span></span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Avg Latency</span>
                            <span class="metric-value">${formatDuration(keyData.avg_latency_ms || 0)}</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Rate Limited</span>
                            <span class="metric-value">${keyData.rate_limited ? '<span class="fail-rate">Yes</span>' : '<span class="success-rate">No</span>'}</span>
                        </div>
                    `;
                }
                html += '</div>';
            }
            return html || '<div class="text-muted text-center py-2">No key statistics</div>';
        }

        function renderRequestMetrics(metrics) {
            if (!metrics || metrics.total_requests === undefined) return '<div class="text-muted text-center py-2">No metrics available</div>';
            
            return `
                <div class="metric-card">
                    <div class="metric-row">
                        <span class="metric-label">Total Requests</span>
                        <span class="metric-value">${metrics.total_requests}</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Successful</span>
                        <span class="metric-value success-rate">${metrics.successful}</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Failed</span>
                        <span class="metric-value fail-rate">${metrics.failed}</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Success Rate</span>
                        <span class="metric-value">${formatRate(metrics.success_rate)}</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Avg Duration</span>
                        <span class="metric-value">${formatDuration(metrics.avg_duration_ms)}</span>
                    </div>
                </div>
            `;
        }

        function renderEndpointMetrics(endpoints) {
            if (!endpoints || Object.keys(endpoints).length === 0) return '<div class="text-muted text-center py-2">No endpoint metrics</div>';
            
            let html = '';
            for (const [endpoint, data] of Object.entries(endpoints)) {
                if (!data.count) continue;
                html += `
                    <div class="endpoint-card">
                        <div class="endpoint-name">${endpoint}</div>
                        <div class="endpoint-stats">
                            Requests: ${data.count} | Avg: ${data.avg_ms}ms | P50: ${data.p50_ms}ms | P95: ${data.p95_ms}ms
                        </div>
                    </div>
                `;
            }
            return html || '<div class="text-muted text-center py-2">No endpoint metrics</div>';
        }

        function renderSLAStatus(sla) {
            if (!sla || !sla.providers) return '<div class="text-muted text-center py-2">No SLA data</div>';
            
            let html = '<div class="row">';
            for (const [provider, data] of Object.entries(sla.providers)) {
                const healthy = data.healthy === true || data.healthy === 'healthy';
                const uptime = data.uptime_percent !== undefined ? data.uptime_percent : 'N/A';
                html += `
                    <div class="col-md-3">
                        <div class="metric-card">
                            <h6>${provider}</h6>
                            <div class="metric-row">
                                <span class="metric-label">Status</span>
                                <span class="metric-value">${healthy ? '<span class="success-rate">Healthy</span>' : '<span class="fail-rate">Degraded</span>'}</span>
                            </div>
                            <div class="metric-row">
                                <span class="metric-label">Uptime</span>
                                <span class="metric-value">${typeof uptime === 'number' ? uptime.toFixed(1) + '%' : uptime}</span>
                            </div>
                            <div class="metric-row">
                                <span class="metric-label">Checks</span>
                                <span class="metric-value">${data.total_checks || 0}</span>
                            </div>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        }

        async function createQuickChat() {
            try {
                const resp = await fetch('/api/chat/chats', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({title: 'Quick Chat', is_temporary: true})
                });
                const data = await resp.json();
                if (data.success) window.location.href = '/chat';
            } catch(e) { console.error(e); }
        }

        updateDashboard();
        setInterval(updateDashboard, 10000);
    </script>
</body>
</html>
